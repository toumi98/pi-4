<div *ngIf="loading" style="padding: 2rem; display: grid; place-items: center;">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<div *ngIf="error && !loading" style="padding: 2rem;">
  {{ error }}
</div>

<app-dispute-center
  *ngIf="contract as currentContract"
  [contract]="currentContract"
  [actorId]="currentContract.freelancerId"
  [actorName]="currentContract.freelancerName"
  [actorRole]="'FREELANCER'"
  [accentClass]="'freelancer'"
  [canModerate]="false"
  [backLink]="'/freelancer/contracts/' + currentContract.id + '/workspace'"
  backLabel="Back to freelancer workspace">
</app-dispute-center>
