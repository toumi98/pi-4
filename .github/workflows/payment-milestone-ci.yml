name: payment-milestone-ci

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: payment
            working_directory: payment/payment
          - service: milestone
            working_directory: milestone/milestone
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven build
        run: mvn -B -DskipTests clean package

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - service: payment
            working_directory: payment/payment
          - service: milestone
            working_directory: milestone/milestone
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven test
        run: mvn -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-reports
          path: ${{ matrix.working_directory }}/target/surefire-reports

  docker-image:
    runs-on: ubuntu-latest
    needs: sonarcloud
    strategy:
      matrix:
        include:
          - service: payment
            context: ./payment/payment
            dockerfile: ./payment/payment/Dockerfile
            image_name: pi-payment
          - service: milestone
            context: ./milestone/milestone
            dockerfile: ./milestone/milestone/Dockerfile
            image_name: pi-milestone
          - service: eureka
            context: ./eureka/eureka
            dockerfile: ./eureka/eureka/Dockerfile
            image_name: pi-eureka
          - service: microservice-user
            context: ./microservice_user
            dockerfile: ./microservice_user/Dockerfile
            image_name: pi-user
          - service: api-gateway
            context: ./api-gateway/api-gateway
            dockerfile: ./api-gateway/api-gateway/Dockerfile
            image_name: pi-gateway
          - service: web
            context: ./web
            dockerfile: ./web/Dockerfile
            image_name: pi-web
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:${{ github.sha }}

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify payment
        run: mvn -B verify
        working-directory: payment/payment

      - name: Verify milestone
        run: mvn -B verify
        working-directory: milestone/milestone

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=toumi98
            -Dsonar.projectKey=toumi98_pi-4
            -Dsonar.sources=payment/payment/src/main,milestone/milestone/src/main
            -Dsonar.tests=payment/payment/src/test,milestone/milestone/src/test
            -Dsonar.java.binaries=payment/payment/target/classes,milestone/milestone/target/classes
            -Dsonar.junit.reportPaths=payment/payment/target/surefire-reports,milestone/milestone/target/surefire-reports
            -Dsonar.coverage.jacoco.xmlReportPaths=payment/payment/target/site/jacoco/jacoco.xml,milestone/milestone/target/site/jacoco/jacoco.xml
            -Dsonar.coverage.exclusions=payment/payment/src/main/java/com/payment/payment/PaymentApplication.java,payment/payment/src/main/java/com/payment/payment/client/**,payment/payment/src/main/java/com/payment/payment/config/**,payment/payment/src/main/java/com/payment/payment/controller/**,payment/payment/src/main/java/com/payment/payment/dto/**,payment/payment/src/main/java/com/payment/payment/exception/**,payment/payment/src/main/java/com/payment/payment/model/**,payment/payment/src/main/java/com/payment/payment/repository/**,payment/payment/src/main/java/com/payment/payment/security/**,milestone/milestone/src/main/java/com/milestone/milestone/MilestoneApplication.java,milestone/milestone/src/main/java/com/milestone/milestone/client/**,milestone/milestone/src/main/java/com/milestone/milestone/config/**,milestone/milestone/src/main/java/com/milestone/milestone/controllers/**,milestone/milestone/src/main/java/com/milestone/milestone/dto/**,milestone/milestone/src/main/java/com/milestone/milestone/exception/**,milestone/milestone/src/main/java/com/milestone/milestone/feign/**,milestone/milestone/src/main/java/com/milestone/milestone/models/**,milestone/milestone/src/main/java/com/milestone/milestone/repositories/**,milestone/milestone/src/main/java/com/milestone/milestone/security/**
