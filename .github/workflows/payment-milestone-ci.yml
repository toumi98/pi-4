name: payment-milestone-ci

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: payment
            working_directory: payment/payment
          - service: milestone
            working_directory: milestone/milestone
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven build
        run: mvn -B -DskipTests clean package

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - service: payment
            working_directory: payment/payment
          - service: milestone
            working_directory: milestone/milestone
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven test
        run: mvn -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-reports
          path: ${{ matrix.working_directory }}/target/surefire-reports

  docker-image:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - service: payment
            context: ./payment/payment
            dockerfile: ./payment/payment/Dockerfile
          - service: milestone
            context: ./milestone/milestone
            dockerfile: ./milestone/milestone/Dockerfile
          - service: eureka
            context: ./eureka/eureka
            dockerfile: ./eureka/eureka/Dockerfile
          - service: api-gateway
            context: ./api-gateway/api-gateway
            dockerfile: ./api-gateway/api-gateway/Dockerfile
          - service: microservice-user
            context: ./microservice_user
            dockerfile: ./microservice_user/Dockerfile
          - service: web
            context: ./web
            dockerfile: ./web/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.service }}:latest

  sonar-placeholder:
    runs-on: ubuntu-latest
    needs: test
    if: false
    strategy:
      matrix:
        include:
          - working_directory: payment/payment
          - working_directory: milestone/milestone
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: SonarQube verify
        run: mvn -B verify sonar:sonar
