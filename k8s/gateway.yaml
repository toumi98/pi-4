apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: mehditoumi/pi-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_DEFAULT_ZONE
              value: http://eureka:8761/eureka
          readinessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pi
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 8089
      targetPort: 8089
