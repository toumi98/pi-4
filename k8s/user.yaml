apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-user
  namespace: pi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microservice-user
  template:
    metadata:
      labels:
        app: microservice-user
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done
        - name: wait-for-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z eureka 8761; do echo waiting for eureka; sleep 2; done
      containers:
        - name: microservice-user
          image: mehditoumi/pi-user:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_DEFAULT_ZONE
              value: http://eureka:8761/eureka/
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/prolance_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&sessionVariables=default_storage_engine=InnoDB
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: SPRING_MAIL_USERNAME
              value: ""
            - name: SPRING_MAIL_PASSWORD
              value: ""
            - name: APP_MAIL_FROM
              value: no-reply@example.com
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8084
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: microservice-user
  namespace: pi
spec:
  selector:
    app: microservice-user
  ports:
    - port: 8084
      targetPort: 8084
