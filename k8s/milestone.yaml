apiVersion: apps/v1
kind: Deployment
metadata:
  name: milestone
  namespace: pi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milestone
  template:
    metadata:
      labels:
        app: milestone
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done
        - name: wait-for-eureka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z eureka 8761; do echo waiting for eureka; sleep 2; done
      containers:
        - name: milestone
          image: mehditoumi/pi-milestone:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_DEFAULT_ZONE
              value: http://eureka:8761/eureka
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/milestone_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: milestone-service
  namespace: pi
spec:
  selector:
    app: milestone
  ports:
    - port: 8081
      targetPort: 8081
